android.useAndroidX=true
android.enableJetifier=false

# Disable file system watching to help with file locking issues on Windows
org.gradle.vfs.watch=false

# Help prevent file locking by disabling memory mapping for ZIP files on Windows
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Dsun.zip.disableMemoryMapping=true

# Disable daemon to help with file locks
org.gradle.daemon=false

# Disable configuration cache to avoid locking issues in the configuration-cache directory
org.gradle.configuration-cache=false

# Parallel execution
org.gradle.parallel=true
android.defaults.buildfeatures.resvalues=true
android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
android.enableAppCompileTimeRClass=false
android.usesSdkInManifest.disallowed=false
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
android.r8.optimizedResourceShrinking=false
android.builtInKotlin=false
android.newDsl=false

# Use local aapt2 from Android SDK instead of downloading from internet
android.aapt2FromMavenOverride=C:\\Users\\thako\\AppData\\Local\\Android\\Sdk\\build-tools\\35.0.0\\aapt2.exe
